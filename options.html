<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Better Gmail Options</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 16px;
        min-width: 300px;
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }
      .header h2 {
        margin: 0;
      }
      #toggleAll {
        font-size: 0.8em;
        padding: 4px 10px;
        border-radius: 4px;
        border: 1px solid #ccc;
        background: #f5f5f5;
        cursor: pointer;
        user-select: none;
      }
      #toggleAll:hover {
        background: #e8e8e8;
      }
      fieldset {
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 8px 14px 12px;
        margin: 0 0 12px;
      }
      legend {
        font-weight: 600;
        font-size: 0.95em;
        padding: 0 6px;
      }
      label {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 8px 0 8px 4px;
        cursor: pointer;
      }
      #status {
        margin-top: 12px;
        color: green;
        font-size: 0.85em;
        min-height: 1em;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>Better Gmail</h2>
      <button id="toggleAll">Disable All</button>
    </div>

    <fieldset>
      <legend>Features</legend>
      <label
        ><input type="checkbox" id="clickToFilter" /> Inbox - click sender name
        to filter</label
      >
      <label
        ><input type="checkbox" id="autoExpandThreads" /> Conversation -
        auto-expand collapsed messages</label
      >
      <label
        ><input type="checkbox" id="clickToCopy" /> Conversation - click email
        address to copy</label
      >
      <label
        ><input type="checkbox" id="alwaysShowEmail" /> Conversation - show
        sender email address</label
      >
      <label
        ><input type="checkbox" id="profileHover" /> Profile image - highlight
        on hover</label
      >
      <label
        ><input type="checkbox" id="domainMode" /> Profile image - alt/meta
        filters by domain</label
      >
      <label
        ><input type="checkbox" id="deleteSpamButton" /> Spam - show "Delete All
        Spam" button</label
      >
    </fieldset>

    <fieldset>
      <legend>Clean Up</legend>
      <label
        ><input type="checkbox" id="hideGemini" /> Top - hide "Try Gemini"
        button</label
      >
      <label
        ><input type="checkbox" id="hideSupportButton" /> Top - hide support
        button</label
      >
      <label
        ><input type="checkbox" id="hideAIOverview" /> Conversation - hide AI
        Overview summary</label
      >
      <label
        ><input type="checkbox" id="hideEmojiReaction" /> Conversation - hide
        emoji reaction button</label
      >
      <label
        ><input type="checkbox" id="hideSuggestedReplies" /> Conversation - hide
        suggested replies</label
      >
      <label
        ><input type="checkbox" id="hideFooterLinks" /> Footer - hide links
        (terms, privacy, activity)</label
      >
      <label
        ><input type="checkbox" id="hideStorageUsed" /> Footer - hide storage
        usage</label
      >
    </fieldset>

    <div id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
